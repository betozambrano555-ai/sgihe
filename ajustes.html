<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGIHE - Ajustes y Seguridad</title>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background-color: #1e293b; padding: 24px; display: flex; flex-direction: column; border-right: 2px solid #2563eb; box-sizing: border-box; }
        .sidebar h2 { color: #38bdf8; text-align: center; margin: 0 0 20px 0; }
        .btn-back { background-color: #334155; color: #f1f5f9; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; margin-top: 20px; }
        .btn-back:hover { background-color: #475569; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .header { border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 30px; }
        .grid-ajustes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .panel-seguridad { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; }
        .panel-seguridad h3 { color: #38bdf8; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .control-grupo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        select { width: 100%; background-color: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .btn-accion { background-color: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-accion:hover { background-color: #1d4ed8; }
        .status-txt { color: #16a34a; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SGIHE</h2>
        <div style="color: #94a3b8; text-align: center; font-size: 14px;">Módulo: Seguridad</div>
        <a href="index.html" class="btn-back">⬅️ Volver al Panel</a>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Ajustes de Seguridad del Sistema</h1>
            <p style="color: #64748b; margin: 5px 0 0 0;">Gestión de accesos, roles operativos y respaldos preventivos de datos.</p>
        </div>
        <div class="grid-ajustes">
            <div class="panel-seguridad">
                <h3>⚙️ Configuración General</h3>
                <div class="control-grupo">
                    <label>Modo de Sincronización Local</label>
                    <select>
                        <option>Sincronizar cada 5 minutos</option>
                        <option>Sincronizar cada hora</option>
                        <option>Solo modo Manual (Offline-First)</option>
                    </select>
                </div>
                <button class="btn-accion" onclick="alert('Éxito: Cambios e información indexados correctamente en el archivo de configuración.')">💾 Guardar Parámetros de Seguridad</button>
            </div>
            <div class="panel-seguridad">
                <h3>¼ Respaldo</h3>
                <p style="font-size: 14px; color: #94a3b8; line-height: 1.4;">Se recomienda descargar un respaldo local semanalmente.</p>
                <span class="status-txt">Último respaldo: Hoy a las 06:00 AM</span>
                <button class="btn-accion" style="margin-top:20px;" onclick="alert('Generando archivo SGIHE_BACKUP.sql... Descarga completada.')">📥 Respaldar Ahora</button>
            </div>
        </div>
    </div>
</body>
</html>
