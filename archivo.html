<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGIHE - Archivo Histórico de Menores</title>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .main-container { 
            width: 100%; 
            max-width: 1000px; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        .panel { 
            background-color: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); 
        }
        
        h2 { 
            color: #3b82f6; 
            margin-top: 0; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 15px;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        
        th {
            background-color: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }
        
        tr:hover {
            background-color: #0f172a;
        }

        .badge-legal {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            background-color: #3b82f6;
            color: white;
        }

        .blood-type {
            background-color: #ef4444;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        
        /* EL SÚPER BOTÓN DE REGRESO DE LEONEL */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #0f172a;
            color: #3b82f6;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .btn-back:hover {
            background-color: #3b82f6;
            color: #ffffff;
            border-color: #60a5fa;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        
        .back-icon { font-size: 18px; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- El botón del menú principal unificado -->
        <a href="index.html" class="btn-back">
            <span class="back-icon">🏠</span> 
            <span>Regresar al Panel Principal</span>
        </a>

        <div class="panel">
            <h2>📁 Archivo Histórico de Expedientes (Menores)</h2>
            
            <table>
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Fecha de Ingreso</th>
                        <th>Situación Legal</th>
                        <th>Tipo Sangre</th>
                        <th>Alergias Detectadas</th>
                    </tr>
                </thead>
                <tbody id="tablaMenores">
                    <tr>
                        <td colspan="5" style="color: #94a3b8; text-align: center;">Cargando expedientes de SGIHE...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDKjZ3My95rimlv1xSjBHdzx5QDFewX9JM",
        authDomain: "sgihe-daf79.firebaseapp.com",
        projectId: "sgihe-daf79",
        storageBucket: "sgihe-daf79.firebasestorage.app",
        messagingSenderId: "685969076721",
        appId: "1:685969076721:web:6576d429da03f5518a9450"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function cargarExpedientes() {
        const tabla = document.getElementById('tablaMenores');
        try {
            // Buscamos exactamente en la colección "menores" que usa menores.html
            const q = query(collection(db, "menores"), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);
            
            tabla.innerHTML = "";

            if(snapshot.empty) {
                tabla.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8;">No hay menores registrados en el sistema.</td></tr>`;
                return;
            }

            snapshot.forEach((doc) => {
                const menor = doc.data();

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td style="font-weight: 600; color: #fff;">👦 ${menor.nombre}</td>
                    <td style="color: #cbd5e1;">${menor.fechaIngreso}</td>
                    <td><span class="badge-legal">${menor.estatusLegal}</span></td>
                    <td><span class="blood-type">${menor.tipoSangre}</span></td>
                    <td style="color: #94a3b8; font-style: italic;">${menor.alergias}</td>
                `;
                tabla.appendChild(fila);
            });

        } catch (error) {
            tabla.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444;">Error al consultar expedientes: ${error.message}</td></tr>`;
        }
      }

      // Ejecutar la carga en cuanto se abra la pantalla
      window.addEventListener('DOMContentLoaded', cargarExpedientes);
    </script>
</body>
</html>
